name: Operations QA

on:
  workflow_dispatch:
    inputs:
      qa_base_url:
        description: Review or production base URL
        required: false
        default: https://khcpqa.vercel.app

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run operations QA
        run: npm run qa:ops
        env:
          QA_BASE_URL: ${{ inputs.qa_base_url }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
